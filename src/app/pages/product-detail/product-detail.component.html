<section class="product-detail">
  <p class="error-message" *ngIf="errorMessage">
    {{ errorMessage }}
  </p>

  <ng-container *ngIf="product as p">
    <div class="product-main">
      <div class="product-image">
        <img
          [src]="getProductImage(p)"
          [alt]="getProductName(p)"
        />
      </div>

      <div class="product-info">
        <span class="category">{{ getProductCategory(p) }}</span>

        <h1>{{ getProductName(p) }}</h1>

        <p class="description">
          {{ getProductDescription(p) }}
        </p>

        <strong class="price">{{ getProductPrice(p) }}</strong>

        <div class="actions">
  <button type="button" class="primary-action" (click)="addToCart()">
    Ajouter au panier
  </button>

  <a routerLink="/products" class="secondary-action">
    Retour au catalogue
  </a>
</div>
      </div>
    </div>

    <section class="suggestions">
      <h2>Produits similaires</h2>

      <p *ngIf="suggestions.length === 0">
        Aucun produit similaire pour le moment.
      </p>

      <div class="suggestions-grid" *ngIf="suggestions.length > 0">
        <article class="suggestion-card" *ngFor="let item of suggestions">
          <h3>{{ getProductName(item) }}</h3>
          <strong>{{ getProductPrice(item) }}</strong>

          <a [routerLink]="['/products', getProductId(item)]">
            Voir
          </a>
        </article>
      </div>
    </section>
  </ng-container>
</section>
