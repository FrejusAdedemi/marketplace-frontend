<div class="pagination" *ngIf="products.length > 0">
  <button
    type="button"
    class="secondary"
    (click)="previousPage()"
    [disabled]="page <= 1"
  >
    Page précédente
  </button>

  <span>
    Page {{ page }} / {{ totalPages }}
  </span>

  <button
    type="button"
    class="secondary"
    (click)="nextPage()"
    [disabled]="page >= totalPages"
  >
    Page suivante
  </button>
</div>
